# Git hooks managed by Lefthook. Install locally with `lefthook install`
# (or `just setup`). Later toolchain slices add a `pre-push` branch-name lint.

pre-commit:
  commands:
    shellcheck:
      # Lint the staged shell files (fast, changed-files-only); `just lint` in CI
      # is the unbypassable whole-project backstop. `just lint stage` discovers the
      # staged shell files itself via maintenance/lint.sh.
      run: just lint stage
    format:
      # Report unformatted staged shell files (report-only, like shellcheck above);
      # `just fmt` in CI is the whole-project backstop. `just fmt` never edits — run
      # `just fmt --write` to apply, or let the editor format on save. The glob scopes
      # {staged_files} to shell, and Lefthook skips the command when none match.
      # shfmt settings come from .editorconfig.
      glob: "*.{sh,bash}"
      run: just fmt {staged_files}

commit-msg:
  commands:
    conventional-commit:
      # {1} is the path to the commit-message file git passes to the hook.
      run: cog verify --file {1}
