# Cocogitto configuration — Conventional Commits 1.0.0.
#
# The git tag is the single source of truth for the version (ADR 0010): a
# release only creates a `vX` tag + GitHub Release, and nothing (VERSION,
# CHANGELOG) is committed. `tag_prefix = "v"` makes cog read only `v*` tags for
# versioning.
#
# The default commit types already match this repo's allowed set (feat, fix,
# build, chore, ci, docs, refactor, perf, style, test).

tag_prefix = "v"
ignore_merge_commits = true

# Keep the release changelog focused on what users care about: only feat
# (Features) and fix (Bug Fixes) reach it. Everything else is a valid commit
# type but internal noise for a release note, so it is omitted (ADR 0010 — the
# changelog is the GitHub Release body). Omitting only hides a type from the
# changelog; cog still parses and version-bumps on it as usual.
[commit_types]
build = { omit_from_changelog = true }
chore = { omit_from_changelog = true }
ci = { omit_from_changelog = true }
docs = { omit_from_changelog = true }
perf = { omit_from_changelog = true }
refactor = { omit_from_changelog = true }
revert = { omit_from_changelog = true }
style = { omit_from_changelog = true }
test = { omit_from_changelog = true }
