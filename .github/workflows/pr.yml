name: pr
# Every PR runs every gate — including stacked PRs onto a non-main base — so no
# branch merges un-gated or un-reviewed. Release routing stays main-only (main.yml).
on:
  pull_request:
permissions:
  contents: read
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true
jobs:
  commit-lint:
    uses: ./.github/workflows/_gate-commit-lint.yml
  branch-lint:
    uses: ./.github/workflows/_gate-branch-lint.yml
  code-lint:
    uses: ./.github/workflows/_gate-code-lint.yml
  format-check:
    uses: ./.github/workflows/_gate-format-check.yml
  test:
    uses: ./.github/workflows/_gate-test.yml
  generate-docs:
    uses: ./.github/workflows/_gate-generate-docs.yml
