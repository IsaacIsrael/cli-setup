name: gate-branch-lint
on:
  workflow_call:
permissions:
  contents: read
jobs:
  branch-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: branch-lint
        # Validates the PR head branch name; brlint.sh reads $GITHUB_HEAD_REF
        # because the checkout HEAD is a detached merge commit, not the branch.
        run: just brlint
