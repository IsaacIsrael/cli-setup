name: gate-branch-lint
on:
  workflow_call:
permissions:
  contents: read
jobs:
  branch-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: branch-lint
        # Validates the PR head branch name; brlint.sh reads $GITHUB_HEAD_REF
        # because the checkout HEAD is a detached merge commit, not the branch.
        run: just brlint
