name: gate-branch-lint
on:
  workflow_call:
permissions:
  contents: read
jobs:
  branch-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: branch-lint
        # Validates the PR head branch name; brlint.sh reads $GITHUB_HEAD_REF
        # because the checkout HEAD is a detached merge commit, not the branch.
        run: just brlint
