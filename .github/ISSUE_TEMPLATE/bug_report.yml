name: Bug report
description: Report something that is broken in cli-setup
title: "bug: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below so we can
        reproduce and triage it quickly. For security vulnerabilities, do **not**
        open an issue — see [SECURITY.md](https://github.com/IsaacIsrael/cli-setup/blob/HEAD/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I run `cli-setup doctor mobile`, ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran.
      placeholder: |
        1. Run `...`
        2. See error
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste the relevant part of `~/.cli-setup/logs/last.log` if available.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: cli-setup version
      description: Output of `cli-setup version` (or the commit you are on).
    validations:
      required: false
  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - Apple Silicon (arm64)
        - Intel (x86_64)
        - Not sure
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 15.6 (Sequoia)
    validations:
      required: true
